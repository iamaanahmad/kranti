version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -e NEXT_PUBLIC_ -e CLERK_ -e APPWRITE_ -e DATABASE_ -e USERS_ >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
